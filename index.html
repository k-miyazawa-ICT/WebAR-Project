<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ARマーカー - iPhone Safari対応</title>

  <!-- A-Frame + AR.js (iPhone Safari で動く唯一の無料WebARスタック) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* AR.jsのcanvasが全画面を使う */
    a-scene {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* UIオーバーレイ */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 999;
      pointer-events: none;
    }

    #status-bar {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 14px;
      padding: 14px 20px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.active { background: #44ff88; }

    #status-text { flex: 1; }

    /* 下部コントロール */
    #bottom-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      pointer-events: all;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { opacity: 0.7; transform: scale(0.97); }

    #btn-start {
      background: #007AFF;
      color: #fff;
    }

    #btn-stop {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .scale-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 13px;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.3);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #007AFF;
      cursor: pointer;
    }

    #scale-val {
      min-width: 32px;
      text-align: right;
      color: rgba(255,255,255,0.7);
    }

    /* マーカーガイド（画面中央） */
    #marker-guide {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 998;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 1;
      transition: opacity 0.5s;
    }
    #marker-guide.hidden { opacity: 0; }

    .guide-frame {
      width: 200px;
      height: 200px;
      position: relative;
    }
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(255,255,255,0.9);
      border-style: solid;
    }
    .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .guide-label {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 20px;
      text-align: center;
    }

    /* 開始前の案内画面 */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      gap: 24px;
    }
    #start-screen.hidden { display: none; }

    .start-title {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }

    .start-desc {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      text-align: center;
      line-height: 1.6;
      max-width: 320px;
    }

    .marker-preview {
      width: 160px;
      height: 160px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .marker-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hiro-svg {
      width: 100%;
      height: 100%;
    }

    .start-note {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    #btn-go {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- 開始前の案内画面 -->
<div id="start-screen">
  <div class="start-title">ARマーカーで<br>3Dモデルを表示</div>

  <div class="marker-preview">
    <!-- Hiroマーカーのプレビュー（シンプルなSVG） -->
    <svg class="hiro-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="white"/>
      <rect x="10" y="10" width="80" height="80" fill="black"/>
      <rect x="20" y="20" width="60" height="60" fill="white"/>
      <!-- HIROパターン（簡略版） -->
      <rect x="25" y="25" width="10" height="10" fill="black"/>
      <rect x="40" y="25" width="10" height="10" fill="black"/>
      <rect x="55" y="25" width="10" height="10" fill="black"/>
      <rect x="65" y="25" width="10" height="10" fill="black"/>
      <rect x="25" y="35" width="10" height="10" fill="black"/>
      <rect x="65" y="35" width="10" height="10" fill="black"/>
      <rect x="25" y="45" width="50" height="10" fill="black"/>
      <rect x="25" y="55" width="10" height="10" fill="black"/>
      <rect x="65" y="55" width="10" height="10" fill="black"/>
      <rect x="25" y="65" width="10" height="10" fill="black"/>
      <rect x="40" y="65" width="10" height="10" fill="black"/>
      <rect x="55" y="65" width="10" height="10" fill="black"/>
      <rect x="65" y="65" width="10" height="10" fill="black"/>
    </svg>
  </div>

  <div class="start-desc">
    上記の <strong>Hiroマーカー</strong> を印刷またはスクリーン表示し、カメラで映すと3Dモデルが出現します
  </div>

  <div class="start-note">
    Safari → カメラアクセスを許可してください<br>
    iPhone 16e + Safari で動作確認済み
  </div>

  <button id="btn-go">カメラを起動してARを開始</button>

  <a href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png"
     style="color:#007AFF; font-size:13px; text-decoration:none;">
    Hiroマーカーを別タブで開く（印刷用）↗
  </a>
</div>

<!-- AR シーン（A-Frame + AR.js） -->
<a-scene
  id="ar-scene"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; precision: medium;"
  style="display:none;"
>
  <a-assets>
    <!-- GLBモデルの読み込み -->
    <a-asset-item
      id="model-asset"
      src="https://k-miyazawa-ict.github.io/WebAR-Project/model.glb"
    ></a-asset-item>
  </a-assets>

  <!-- Hiroマーカー検出時に3Dモデルを表示 -->
  <a-marker
    id="hiro-marker"
    preset="hiro"
    emitevents="true"
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5"
  >
    <a-entity
      id="ar-model"
      gltf-model="#model-asset"
      scale="0.5 0.5 0.5"
      position="0 0 0"
      rotation="0 0 0"
    ></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- UIオーバーレイ（AR起動後に表示） -->
<div id="ui-overlay" style="display:none;">
  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">マーカーを探しています...</span>
  </div>
</div>

<div id="marker-guide">
  <div class="guide-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="guide-label">Hiroマーカーをここに合わせてください</div>
</div>

<div id="bottom-controls" style="display:none;">
  <div class="btn-row">
    <button id="btn-stop">ARを終了</button>
  </div>
  <div class="scale-row">
    <span>サイズ</span>
    <input type="range" id="scale-slider" min="0.1" max="2.0" step="0.1" value="0.5">
    <span id="scale-val">0.5×</span>
  </div>
</div>

<script>
  const startScreen = document.getElementById('start-screen');
  const arScene = document.getElementById('ar-scene');
  const uiOverlay = document.getElementById('ui-overlay');
  const bottomControls = document.getElementById('bottom-controls');
  const markerGuide = document.getElementById('marker-guide');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const arModel = document.getElementById('ar-model');
  const scaleSlider = document.getElementById('scale-slider');
  const scaleVal = document.getElementById('scale-val');

  // 開始ボタン
  document.getElementById('btn-go').addEventListener('click', () => {
    startScreen.classList.add('hidden');
    arScene.style.display = 'block';
    uiOverlay.style.display = 'block';
    bottomControls.style.display = 'block';
    markerGuide.style.display = 'flex';

    // マーカー検出イベント
    const marker = document.getElementById('hiro-marker');
    marker.addEventListener('markerFound', () => {
      statusDot.classList.add('active');
      statusText.textContent = 'マーカーを検出！ 3Dモデル表示中';
      markerGuide.classList.add('hidden');
    });
    marker.addEventListener('markerLost', () => {
      statusDot.classList.remove('active');
      statusText.textContent = 'マーカーを探しています...';
      markerGuide.classList.remove('hidden');
    });
  });

  // 停止ボタン
  document.getElementById('btn-stop').addEventListener('click', () => {
    arScene.style.display = 'none';
    uiOverlay.style.display = 'none';
    bottomControls.style.display = 'none';
    markerGuide.style.display = 'none';
    startScreen.classList.remove('hidden');
  });

  // スケールスライダー
  scaleSlider.addEventListener('input', () => {
    const v = parseFloat(scaleSlider.value).toFixed(1);
    scaleVal.textContent = v + '×';
    if (arModel) {
      arModel.setAttribute('scale', `${v} ${v} ${v}`);
    }
  });
</script>

</body>
</html>
